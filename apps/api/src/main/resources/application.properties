spring.application.name=p2p-roommate
# ===================================================================
# Core Server Configuration
# ===================================================================
server.port=8080
server.shutdown=graceful

# Crucial for Java 25 Loom ecosystem - routes standard servlet workers to Virtual Threads
spring.threads.virtual.enabled=true

# ===================================================================
# Relational Database Config (PostgreSQL)
# ===================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stay_bg_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stay_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SuperSecureStayPass2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Performance Settings Optimization
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=StayHikariCP
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# ===================================================================
# Database Migrations (Flyway)
# ===================================================================
spring.flyway.enabled=true
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.url=${spring.datasource.url}
# Prevents accidental production data clears
spring.flyway.clean-disabled=true 
# Creates the flyway history table inside public automatically
spring.flyway.baseline-on-migrate=true

# ===================================================================
# Hibernate & JPA Properties
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Memory Cache Layer (Redis Configuration)
# ===================================================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:SecureRedisPass2026}
spring.data.redis.repositories.enabled=false

# ===================================================================
# Validation & System Telemetry (Actuator)
# ===================================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# ===================================================================
# Security Configurations Layer
# ===================================================================
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY}
application.security.jwt.expiration=${APPLICATION_SECURITY_JWT_EXPIRATION}